<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <style>
        /* Base Styling to match the image */
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: url('https://images.unsplash.com/photo-1580519542036-c47de6196ba5?auto=format&fit=crop&w=1350&q=80') no-repeat center center fixed;
            background-size: cover;
        }

        /* The frosted glass container */
        .converter-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            width: 450px;
            color: white;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        h1 {
            font-weight: 300;
            font-size: 2.5rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            font-size: 1.5rem;
            margin-bottom: 15px;
        }

        select, input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #fff;
            color: white;
            font-size: 1rem;
            border-radius: 4px;
        }

        option {
            background: #333;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        #amount {
            flex: 2;
        }

        button {
            flex: 1;
            background: transparent;
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        button:hover {
            background: white;
            color: #333;
        }

        .result-container {
            margin-top: 30px;
            background: rgba(0, 0, 0, 0.3);
            padding: 10px;
            font-size: 1.2rem;
            min-height: 1.5rem;
        }

        /* Bonus Switch Button Styling */
        #switch-btn {
            background: none;
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            margin: -10px 0 10px 0;
        }
    </style>
</head>
<body>

    <div class="converter-card">
        <h1>Currency Converter</h1>

        <div class="input-group">
            <label>From:</label>
            <select id="from-currency"></select>
        </div>

        <button id="switch-btn" title="Switch Currencies">⇅</button>

        <div class="input-group">
            <label>To:</label>
            <select id="to-currency"></select>
        </div>

        <label>Amount:</label>
        <div class="row">
            <input type="number" id="amount" value="1">
            <button id="convert-btn">Convert</button>
        </div>

        <div class="result-container" id="result-text">
            --.--
        </div>
    </div>

    <script>
        const API_KEY = 'YOUR_API_KEY'; // REPLACE THIS WITH YOUR REAL KEY
        const fromSelect = document.getElementById('from-currency');
        const toSelect = document.getElementById('to-currency');
        const amountInput = document.getElementById('amount');
        const convertBtn = document.getElementById('convert-btn');
        const resultText = document.getElementById('result-text');
        const switchBtn = document.getElementById('switch-btn');

        // 1. Fetch supported currencies on load
        async function fetchCurrencies() {
            try {
                const response = await fetch(`https://v6.exchangerate-api.com/v6/${API_KEY}/codes`);
                const data = await response.json();
                
                if (data.result === "success") {
                    populateDropdowns(data.supported_codes);
                } else {
                    resultText.innerText = "Error loading currencies";
                }
            } catch (err) {
                console.error(err);
                resultText.innerText = "Connection Error";
            }
        }

        function populateDropdowns(codes) {
            codes.forEach(([code, name]) => {
                const option1 = new Option(`${code} - ${name}`, code);
                const option2 = new Option(`${code} - ${name}`, code);
                fromSelect.add(option1);
                toSelect.add(option2);
            });

            // Set default values matching your image
            fromSelect.value = "USD";
            toSelect.value = "ILS";
        }

        // 2. Main conversion function
        async function convertCurrency() {
            const from = fromSelect.value;
            const to = toSelect.value;
            const amount = amountInput.value;

            if (amount === "" || amount <= 0) return;

            resultText.innerText = "Converting...";

            try {
                const response = await fetch(`https://v6.exchangerate-api.com/v6/${API_KEY}/pair/${from}/${to}/${amount}`);
                const data = await response.json();

                if (data.result === "success") {
                    resultText.innerText = `${data.conversion_result.toFixed(5)} ${to}`;
                } else {
                    resultText.innerText = "Conversion failed";
                }
            } catch (err) {
                resultText.innerText = "Error fetching rate";
            }
        }

        // 3. Bonus: Switch functionality
        switchBtn.addEventListener('click', () => {
            const temp = fromSelect.value;
            fromSelect.value = toSelect.value;
            toSelect.value = temp;
            convertCurrency();
        });

        // Event Listeners
        convertBtn.addEventListener('click', convertCurrency);
        
        // Initialize the app
        fetchCurrencies();
    </script>
</body>
</html>
