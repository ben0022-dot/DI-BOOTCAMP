<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro Pokedex App</title>
    <style>
        :root {
            --pokedex-red: #dc0a2d;
            --pokedex-dark: #232323;
            --screen-blue: #98cbff;
            --info-bg: #f0f0f0;
        }

        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        #logo {
            width: 300px;
            margin-bottom: 20px;
        }

        /* Pokedex Main Container */
        .pokedex {
            width: 700px;
            height: 500px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Section (Red Fold) */
        .top-section {
            background-color: var(--pokedex-red);
            height: 50%;
            border: 4px solid black;
            border-bottom: 10px solid #8b0000;
            border-radius: 20px 20px 0 0;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .camera-dots {
            position: absolute;
            left: 20px;
            top: 40px;
            display: grid;
            grid-template-columns: repeat(2, 10px);
            gap: 10px;
        }

        .dot {
            width: 10px;
            height: 10px;
            background: black;
            border-radius: 50%;
        }

        .main-screen-container {
            width: 250px;
            height: 180px;
            background: var(--pokedex-dark);
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 4px solid black;
        }

        #pokemon-img-container {
            width: 100%;
            height: 100%;
            background: var(--screen-blue);
            border-radius: 5px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #pokemon-img-container img {
            width: 120px;
            image-rendering: pixelated;
        }

        /* Bottom Section */
        .bottom-section {
            background-color: var(--pokedex-red);
            height: 50%;
            border: 4px solid black;
            border-top: none;
            border-radius: 0 0 20px 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 20px;
        }

        /* Info Display */
        .info-card {
            width: 220px;
            height: 180px;
            background: #ffe4c4;
            border: 3px solid #555;
            border-radius: 10px;
            padding: 10px;
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.2);
            font-size: 14px;
        }

        .info-card h2 { margin: 0 0 10px 0; text-align: center; text-transform: capitalize; }
        .info-card p { margin: 5px 0; font-weight: bold; }

        /* Controls */
        .d-pad {
            position: relative;
            width: 100px;
            height: 100px;
            background: var(--pokedex-dark);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .arrow {
            background: #444;
            border: 2px solid black;
            color: white;
            cursor: pointer;
            position: absolute;
            width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
        }

        .arrow:hover { background: #666; }
        .arrow:active { background: #222; }

        .btn-left { left: 0; border-radius: 5px 0 0 5px; }
        .btn-right { right: 0; border-radius: 0 5px 5px 0; }

        /* Random Green Button */
        .green-button-container {
            width: 100px;
            height: 100px;
            background: var(--pokedex-dark);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .green-btn {
            width: 60px;
            height: 60px;
            background: #51ae5f;
            border-radius: 50%;
            border: 4px solid #2e5d36;
            cursor: pointer;
            box-shadow: 0 4px #2e5d36;
        }

        .green-btn:active {
            box-shadow: 0 0 #2e5d36;
            transform: translateY(4px);
        }

        .instructions {
            margin-top: 20px;
            max-width: 500px;
            text-align: left;
        }
    </style>
</head>
<body>

    <img id="logo" src="https://upload.wikimedia.org/wikipedia/commons/9/98/International_Pok%C3%A9mon_logo.svg" alt="Pokemon Logo">

    <div class="pokedex">
        <div class="top-section">
            <div class="camera-dots">
                <div class="dot"></div><div class="dot"></div>
                <div class="dot"></div><div class="dot"></div>
            </div>
            
            <div class="main-screen-container">
                <div id="pokemon-img-container">
                    <p id="loading-text" style="display:none">Loading...</p>
                    <img id="poke-sprite" src="" alt="">
                </div>
            </div>
        </div>

        <div class="bottom-section">
            <div class="d-pad">
                <button class="arrow btn-left" onclick="changePokemon(-1)">◀</button>
                <button class="arrow btn-right" onclick="changePokemon(1)">▶</button>
            </div>

            <div class="info-card" id="info-display">
                <h2 id="poke-name">Welcome!</h2>
                <p id="poke-id">No: --</p>
                <p id="poke-height">Height: --</p>
                <p id="poke-weight">Weight: --</p>
                <p id="poke-type">Type: --</p>
            </div>

            <div class="green-button-container">
                <button class="green-btn" onclick="fetchRandomPokemon()"></button>
            </div>
        </div>
    </div>

    <div class="instructions">
        <h3>How to use:</h3>
        <p>1- Press the <strong>green</strong> button to get a random Pokémon.</p>
        <p>2- Press the <strong>left</strong> and <strong>right</strong> buttons to see previous and next Pokémon.</p>
    </div>

    <script>
        let currentPokemonId = 1;

        // Initialize with Bulbasaur
        window.onload = () => fetchPokemonData(1);

        async function fetchPokemonData(id) {
            const loadingText = document.getElementById('loading-text');
            const sprite = document.getElementById('poke-sprite');
            
            // Show loading state
            loadingText.style.display = 'block';
            sprite.style.display = 'none';

            try {
                const response = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
                
                if (!response.ok) throw new Error('Not found');

                const data = await response.json();
                currentPokemonId = data.id;
                displayPokemon(data);
            } catch (error) {
                document.getElementById('poke-name').innerText = "Oh no!";
                document.getElementById('info-display').innerHTML = `<h2>Error</h2><p>That Pokemon isn't available...</p>`;
                sprite.src = "";
            } finally {
                loadingText.style.display = 'none';
            }
        }

        function displayPokemon(data) {
            const sprite = document.getElementById('poke-sprite');
            sprite.src = data.sprites.front_default;
            sprite.style.display = 'block';

            document.getElementById('poke-name').innerText = data.name;
            document.getElementById('poke-id').innerText = `Pokemon n° ${data.id}`;
            document.getElementById('poke-height').innerText = `Height: ${data.height * 10}cm`;
            document.getElementById('poke-weight').innerText = `Weight: ${data.weight / 10}kg`;
            document.getElementById('poke-type').innerText = `Type: ${data.types.map(t => t.type.name).join(', ')}`;
        }

        async function fetchRandomPokemon() {
            const randomId = Math.floor(Math.random() * 1000) + 1;
            await fetchPokemonData(randomId);
        }

        async function changePokemon(direction) {
            let nextId = currentPokemonId + direction;
            if (nextId < 1) nextId = 1; 
            await fetchPokemonData(nextId);
        }
    </script>
</body>
</html>
